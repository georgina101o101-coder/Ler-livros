<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sem conexão — LerLivros</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        text-align: center;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 32px 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      .icon {
        width: 64px; height: 64px;
        margin: 0 auto 16px;
        border-radius: 16px;
        background: #1f4ed8;
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 28px; font-weight: 700;
      }
      h1 { margin: 0 0 8px; font-size: 20px; }
      p { margin: 0 0 20px; color: #475569; font-size: 14px; line-height: 1.5; }
      button {
        background: #1f4ed8; color: #fff; border: 0;
        padding: 10px 18px; border-radius: 8px; font-weight: 600;
        cursor: pointer; font-size: 14px;
      }
      button:hover { background: #1e40af; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📚</div>
      <h1>Você está sem conexão</h1>
      <p>Não foi possível carregar esta página. Verifique sua internet e tente novamente. Os livros já abertos continuam disponíveis offline.</p>
      <button onclick="location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
